name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test & govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Test
        run: go test ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Unix only: the scanner uses syscall.Statfs, which isn't available on Windows.
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build release archives
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          bin="vdr"
          version="${GITHUB_REF_NAME#v}"

          echo "Building ${GOOS}/${GOARCH} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X github.com/stackArmor/trivy-plugin-vdr/internal/buildinfo.PluginVersion=${version}" -o "$bin" ./cmd/vdr

          tar -czf "dist/vdr_${GOOS}_${GOARCH}.tar.gz" "$bin" plugin.yaml

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: vdr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/vdr_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: vdr-*
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
