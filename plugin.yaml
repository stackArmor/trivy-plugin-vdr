name: vdr
version: 0.1.0
repository: github.com/matthewvenne/trivy-plugin-k8s-vdr
summary: Vulnerability detection and response reporting
usage: trivy vdr <source> [flags]
description: Inventory source images, scan them with Trivy, and report resource-level vulnerability context. Kubernetes is available with the k8s source.
platforms:
  - uri: https://github.com/matthewvenne/trivy-plugin-k8s-vdr/releases/download/v{{ .Version }}/vdr_{{ .OS }}_{{ .Arch }}.tar.gz
    bin: vdr
