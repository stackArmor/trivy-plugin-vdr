name: vdr
version: 0.3.0
repository: github.com/stackArmor/trivy-plugin-vdr
maintainer: stackArmor
summary: Vulnerability detection and response reporting
description: Inventory source images, scan them with Trivy, and report resource-level vulnerability context. Kubernetes is available with the k8s source.
platforms:
  - selector:
      os: darwin
      arch: amd64
    uri: https://github.com/stackArmor/trivy-plugin-vdr/releases/download/v0.3.0/vdr_darwin_amd64.tar.gz
    bin: ./vdr
  - selector:
      os: darwin
      arch: arm64
    uri: https://github.com/stackArmor/trivy-plugin-vdr/releases/download/v0.3.0/vdr_darwin_arm64.tar.gz
    bin: ./vdr
  - selector:
      os: linux
      arch: amd64
    uri: https://github.com/stackArmor/trivy-plugin-vdr/releases/download/v0.3.0/vdr_linux_amd64.tar.gz
    bin: ./vdr
  - selector:
      os: linux
      arch: arm64
    uri: https://github.com/stackArmor/trivy-plugin-vdr/releases/download/v0.3.0/vdr_linux_arm64.tar.gz
    bin: ./vdr
