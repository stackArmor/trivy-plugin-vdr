# Create one Role and RoleBinding in each namespace VDR scans. Replace the
# namespace, resourceNames, and subject with values for your environment.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vdr-image-pull-secret-reader
  namespace: example-application
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - application-registry-credentials
      - platform-registry-credentials
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vdr-image-pull-secret-reader
  namespace: example-application
subjects:
  - kind: ServiceAccount
    name: vdr
    namespace: vdr-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vdr-image-pull-secret-reader
