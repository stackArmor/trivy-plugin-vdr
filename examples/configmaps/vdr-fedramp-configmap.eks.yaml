---
# Example trivy-plugin-vdr scoring ConfigMap for an EKS cluster.
#
# The plugin reads kube-system/vdr-fedramp from the cluster automatically (no
# --scoring-config flag needed) and deep-merges the embedded scoring.yaml over its
# built-in rubric. The built-in rubric already provides the full archetype catalog,
# the algorithm, the EPSS LEV threshold (0.70), and the H/H/H "unclassified"
# cluster-default archetype for new/unclassified resources — so this file only
# carries cluster-wide Class/scope and the rules for EKS-managed,
# shared-responsibility components that cannot carry vdr.fedramp.io/* labels.
#
# If this ConfigMap is missing, the plugin warns and falls back to its built-in
# defaults (Class B, single-agency, no tenant rules).
#
# Apply with:  kubectl apply -f vdr-fedramp-configmap.eks.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vdr-fedramp
  namespace: kube-system
data:
  # --- cluster-wide scalars (override anything the embedded doc sets) ---
  class: "B"            # set to your FedRAMP Certification Class: A, B, C, or D
  multiAgency: "false"  # "true" if this cluster serves more than one agency

  scoring.yaml: |
    # First match wins. nameRules win over namespaceRules. namespace is an optional
    # glob on the workload namespace; match is a glob on the workload name.
    nameRules:
      # EKS Pod Identity / IRSA credential broker.
      - {namespace: kube-system, match: "eks-pod-identity-agent*", archetype: identity-secrets}
      # VPC CNI dataplane and kube-proxy.
      - {namespace: kube-system, match: "aws-node*", archetype: orchestrator}
      - {namespace: kube-system, match: kube-proxy, archetype: orchestrator}
      # Storage CSI drivers (EBS/EFS/FSx).
      - {namespace: kube-system, match: "ebs-csi-*", archetype: orchestrator}
      - {namespace: kube-system, match: "efs-csi-*", archetype: orchestrator}
      - {namespace: kube-system, match: "fsx-csi-*", archetype: orchestrator}
      # Node provisioning / autoscaling actuators.
      - {namespace: kube-system, match: "cluster-autoscaler*", archetype: orchestrator}
      - {namespace: kube-system, match: "karpenter*", archetype: orchestrator}
      # Cluster DNS.
      - {namespace: kube-system, match: "coredns*", archetype: app-tier}
      # Ingress / load-balancer controller (provisions public ALBs/NLBs).
      - {namespace: kube-system, match: "aws-load-balancer-controller*", archetype: public-edge}

    namespaceRules:
      # CloudWatch agent / Fluent Bit observability.
      - {match: amazon-cloudwatch, archetype: internal-tooling}
      # Other AWS-managed add-on namespaces (guardduty agent, etc.).
      - {match: "aws-*", archetype: internal-tooling}
      # Everything else in kube-system (metrics-server, node-local-dns, device
      # plugins, etc.) is low-privilege node/observability infra.
      - {match: kube-system, archetype: internal-tooling}
