---
# Example trivy-plugin-vdr scoring ConfigMap for an AKS cluster.
#
# The plugin reads fedramp-vdr-trivy/vdr-fedramp from the cluster automatically
# (no --scoring-config flag needed). It deep-merges the embedded scoring.yaml over its
# built-in rubric. The built-in rubric already provides the full archetype catalog,
# the algorithm, the EPSS LEV threshold (0.50), and the H/H/H "unclassified"
# cluster-default archetype for new/unclassified resources — so this file only
# carries cluster-wide Class/scope and the rules for AKS-managed,
# shared-responsibility components that cannot carry vdr.fedramp.io/* labels.
#
# If this ConfigMap is missing, the plugin warns and falls back to its built-in
# defaults (Class B, single-agency, no tenant rules).
#
# Apply with:  kubectl apply -f vdr-fedramp-configmap.aks.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: fedramp-vdr-trivy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vdr-fedramp
  namespace: fedramp-vdr-trivy
data:
  # --- cluster-wide scalars (override anything the embedded doc sets) ---
  class: "B"            # set to your FedRAMP Certification Class: A, B, C, or D
  multiAgency: "false"  # "true" if this cluster serves more than one agency

  # --- operator-declared internet-reachable classes (optional) ---
  # List Ingress/Gateway class names whose edge load balancer is provisioned
  # outside Kubernetes (e.g. ingress-nginx or a custom Gateway fronted by an LB
  # built via Terraform), so reachability cannot be inferred from cluster state.
  # Any Ingress/Gateway using a listed class is treated as internet-reachable.
  # This is a cleaner alternative to labeling each resource with
  # vdr.fedramp.io/internet-reachable (which a Helm chart may apply to undesired
  # resources). A per-class label still wins over this list.
  # internetAccessibleIngressClasses: |
  #   - nginx
  # internetAccessibleGatewayClasses: |
  #   - istio

  scoring.yaml: |
    # First match wins. nameRules win over namespaceRules. namespace is an optional
    # glob on the workload namespace; match is a glob on the workload name.
    nameRules:
      # Microsoft Entra Workload Identity / AAD pod identity credential broker.
      - {namespace: kube-system, match: "azure-wi-webhook*", archetype: identity-secrets}
      - {namespace: kube-system, match: "aad-pod-identity*", archetype: identity-secrets}
      # Azure CNI dataplane, network policy, masq, and kube-proxy.
      - {namespace: kube-system, match: "azure-cns*", archetype: orchestrator}
      - {namespace: kube-system, match: "azure-npm*", archetype: orchestrator}
      - {namespace: kube-system, match: "azure-ip-masq-agent*", archetype: orchestrator}
      - {namespace: kube-system, match: kube-proxy, archetype: orchestrator}
      - {namespace: kube-system, match: "konnectivity-agent*", archetype: orchestrator}
      - {namespace: kube-system, match: "cloud-node-manager*", archetype: orchestrator}
      # Storage CSI drivers (Azure Disk / File / Blob).
      - {namespace: kube-system, match: "csi-*", archetype: orchestrator}
      # Cluster DNS. platform-foundation is for METADATA-ONLY foundation services
      # (DNS/NTP/discovery/plain L4 LBs): CR:L (recon only), IR:H, AR:H. Anything
      # that terminates TLS or sees payload belongs in public-edge (internet-
      # facing) or app-tier (internal) instead.
      - {namespace: kube-system, match: "coredns*", archetype: platform-foundation}
      # Azure Policy / Gatekeeper admission enforcement.
      - {namespace: kube-system, match: "azure-policy*", archetype: security-tooling}
      # Application Gateway Ingress Controller. It carries no traffic — it holds
      # Azure credentials that provision and reshape the public App Gateway, so
      # the control-plane lens applies: config-actuation. (App Gateway terminates
      # TLS on Azure's side; an in-cluster terminating proxy would be
      # public-edge, a pure L4/SNI passthrough would be passthrough-edge.)
      - {namespace: kube-system, match: "ingress-appgw*", archetype: config-actuation}

    namespaceRules:
      # OPA Gatekeeper policy enforcement.
      - {match: gatekeeper-system, archetype: security-tooling}
      # Calico network policy (if enabled).
      - {match: calico-system, archetype: orchestrator}
      # Azure Monitor / Container Insights and other Azure-managed add-on namespaces.
      - {match: "azure-*", archetype: internal-tooling}
      - {match: "aks-*", archetype: internal-tooling}
      # Everything else in kube-system (metrics-server, ama-* agents, coredns
      # autoscaler, etc.) is low-privilege node/observability infra.
      - {match: kube-system, archetype: internal-tooling}
